<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War Card Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .player {
            margin: 20px;
        }
        .cards {
            display: flex;
            justify-content: center;
            margin: 20px;
        }
        .card {
            border: 1px solid black;
            padding: 10px;
            margin: 5px;
            width: 100px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <h1>War Card Game</h1>
    <div class="player" id="player1">
        <h2>Player 1</h2>
        <button onclick="playTurn(1)">Play Card</button>
        <p>Cards Left: <span id="player1-cards">26</span></p>
    </div>
    <div class="cards">
        <div class="card" id="player1-card">?</div>
        <div class="card" id="player2-card">?</div>
    </div>
    <div class="player" id="player2">
        <h2>Player 2</h2>
        <button onclick="playTurn(2)">Play Card</button>
        <p>Cards Left: <span id="player2-cards">26</span></p>
    </div>
    <script>
        let player1Cards = 26;
        let player2Cards = 26;

        function playTurn(player) {
            if (player === 1) {
                document.getElementById('player1-card').innerText = Math.floor(Math.random() * 13) + 2;
                player1Cards--;
                document.getElementById('player1-cards').innerText = player1Cards;
            } else {
                document.getElementById('player2-card').innerText = Math.floor(Math.random() * 13) + 2;
                player2Cards--;
                document.getElementById('player2-cards').innerText = player2Cards;
            }

            if (player1Cards === 0 || player2Cards === 0) {
                alert(player1Cards > 0 ? "Player 1 Wins!" : "Player 2 Wins!");
            }
        }
    </script>
</body>
</html>
